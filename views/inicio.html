<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            font-family: sans-serif;
        }

       
        .tela {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-direction: column;
        }

        button {
            --button_radius: 0.75em;
            --button_color: #e8e8e8;
            --button_outline_color: #000000;
            font-size: 17px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            border-radius: var(--button_radius);
            background: var(--button_outline_color);
            width: 80%;
        }

        .button_top {
            display: block;
            box-sizing: border-box;
            border: 2px solid var(--button_outline_color);
            border-radius: var(--button_radius);
            padding: 0.75em 1.5em;
            background: var(--button_color);
            color: var(--button_outline_color);
            transform: translateY(-0.2em);
            transition: transform 0.1s ease;
        }

        button:hover .button_top {
            transform: translateY(-0.33em);
        }

        button:active .button_top {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="tela">
        <button onclick="conversor1()">
            <span class="button_top">Texto para Binário</span>
        </button>
        
        <button onclick="conversor2()">
            <span class="button_top">Binário para Texto</span>
        </button>
    </div>

<script>
    function conversor1() {
        window.location.href = "/conversor1"
    }

    function conversor2() {
        window.location.href = "/conversor2"
    }
</script>
</body>

</html>
